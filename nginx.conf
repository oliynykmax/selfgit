worker_processes 1;
error_log /dev/stderr;
pid /tmp/nginx.pid;
env GIT_TOKEN;

events {
    worker_connections 128;
}

http {
    access_log /dev/stdout;
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    # Load token from env via Lua or use htpasswd approach
    map $http_authorization $auth_valid {
        default 0;
        "~^Basic " 1;
    }

    server {
        listen 8080;
        server_name _;

        # Read operations - no auth required
        location ~ ^/(.*)/git-upload-pack$ {
            include /etc/nginx/git-fastcgi.conf;
            fastcgi_param PATH_INFO /$1/git-upload-pack;
        }

        location ~ ^/(.*)/info/refs$ {
            # Only require auth for push service
            if ($args ~ service=git-receive-pack) {
                rewrite ^ /auth-push$uri last;
            }
            include /etc/nginx/git-fastcgi.conf;
            fastcgi_param PATH_INFO /$1/info/refs;
        }

        # Push operations - auth required
        location ~ ^/auth-push/(.*)/info/refs$ {
            auth_basic "Git Push";
            auth_basic_user_file /etc/nginx/.htpasswd;
            include /etc/nginx/git-fastcgi.conf;
            fastcgi_param PATH_INFO /$1/info/refs;
            fastcgi_param REMOTE_USER $remote_user;
        }

        location ~ ^/(.*)/git-receive-pack$ {
            auth_basic "Git Push";
            auth_basic_user_file /etc/nginx/.htpasswd;
            include /etc/nginx/git-fastcgi.conf;
            fastcgi_param PATH_INFO /$1/git-receive-pack;
            fastcgi_param REMOTE_USER $remote_user;
        }

        # Other requests (like fetching objects)
        location ~ ^/(.*)$ {
            include /etc/nginx/git-fastcgi.conf;
            fastcgi_param PATH_INFO /$1;
        }
    }
}
